<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Eventos - Paróquia Santa Maria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <div class="login-sidebar">
            <div class="sidebar-content">
                <i class="fa-solid fa-church church-icon"></i>
                <h2>Portal de Eventos</h2>
                <p>Participe dos nossos encontros, retiros e celebrações. Conecte-se com a nossa comunidade!</p>
            </div>
        </div>

        <div class="login-form-area">
            <div class="form-header">
                <h1>Bem-vindo</h1>
                <p>Faça login para gerenciar suas inscrições</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="exemplo@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Sua senha" required>
                        <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> Lembrar-me
                    </label>
                    <a href="#" class="forgot-password" onclick="handleForgotPassword()">Esqueceu a senha?</a>
                </div>

                <div id="messageBox" class="message-box"></div>

                <button type="submit" class="btn-submit">
                    <span>Entrar</span>
                    <i class="fa-solid fa-right-to-bracket"></i>
                </button>
            </form>

            <div class="form-footer">
                <p>Novo por aqui? <a href="#" onclick="handleRegisterRedirect()">Criar uma conta paroquial</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
